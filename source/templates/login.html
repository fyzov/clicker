{% extends "base.html" %}

{% block title %}Clicker - Login{% endblock %}

{% block content %}
<main id="login-form" class="blur-block">
    <h2>Login to Clicker</h2>
    <form id="login-form-element">
        <input type="text" id="username-input" placeholder="Enter username" class="blur-block" required>
        <button type="submit" class="blur-block">Play</button>
    </form>
    <div id="login-error" class="error-message" style="display: none;"></div>
</main>
{% endblock %}
