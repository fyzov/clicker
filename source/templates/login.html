<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../static/img/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="../static/css/style.css">
    <title>Clicker - Login</title>
</head>

<body>
    <main class="blur-block login-form">
        <h2>Login to Clicker</h2>
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Enter username" required>
            <button type="submit" class="blur-block">Play</button>
        </form>
    </main>

    <style>
        .login-form {
            max-width: 300px;
            margin: 100px auto;
            padding: 20px;
            text-align: center;
        }

        .login-form input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 16px;
        }

        .login-form input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .login-form button {
            width: 100%;
            padding: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        .login-form button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .floating-points {
            position: absolute;
            color: gold;
            font-weight: bold;
            font-size: 24px;
            animation: float 1s ease-out forwards;
            pointer-events: none;
            z-index: 1000;
        }

        @keyframes float {
            0% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateY(-50px);
            }
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        .message.success {
            background: linear-gradient(135deg, #00b09b, #96c93d);
        }

        .message.error {
            background: linear-gradient(135deg, #ff6b6b, #ee5253);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .upgrade-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .upgrade-btn:disabled:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>

    <script src="../static/js/script.js"></script>
</body>

</html>
