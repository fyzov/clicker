services:
  - type: web
    name: clicker-game
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_PATH
        value: /data/accounts.db
      - key: SECRET_KEY
        generateValue: true
